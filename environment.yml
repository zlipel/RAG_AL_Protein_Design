# Conda environment for RAG-AL (Linux/cluster, CUDA).
#
# Step 1 — create the base env:
#   conda env create -f environment.yml
#
# Step 2 — install PyTorch + torchvision with CUDA.
#   Check your cluster CUDA version first: nvcc --version
#   Then pick the matching tag from https://pytorch.org/get-started/locally/
#   e.g. CUDA 12.1 → cu121 | CUDA 12.4 → cu124
#
#   pip install torch torchvision \
#       --index-url https://download.pytorch.org/whl/cu121
#
# Step 3 — install BoTorch + GPyTorch (requires torch already present):
#   pip install botorch gpytorch
#
# Step 4 — install this package in editable mode:
#   pip install -e ".[dev]"

name: rag_al
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip

  # Scientific stack — conda resolves binary compatibility
  - numpy>=1.26
  - scipy>=1.13
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - seaborn>=0.13
  - tqdm>=4.65

  # Jupyter / notebook support
  - ipykernel
  - ipywidgets

  - pip:
    - "transformers>=4.40"
    # Dev / QA
    - ruff
    - mypy
    - pytest
    - ipython
    # torch, torchvision, gpytorch, botorch intentionally omitted —
    # install manually after env creation (steps 2–3 above) because
    # the correct CUDA wheel URL depends on your cluster's CUDA version.
